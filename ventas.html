<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas · Aromas y Más</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3efe9;color:#2b211b}
header{background:linear-gradient(180deg,#7b5a46,#5d4333);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:24px}
.volver{background:white;color:#5d4333;border:0;border-radius:999px;padding:10px 16px;font-weight:900}
.contenedor{padding:18px;max-width:850px;margin:auto}
.card{background:white;border-radius:24px;padding:20px;margin-bottom:18px;box-shadow:0 10px 24px rgba(0,0,0,.12)}
label{font-weight:900;margin-top:12px;display:block}
input,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #cfc7bf;font-size:16px;margin-top:6px}
textarea{min-height:80px}
.botones{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:16px;padding:14px 18px;font-size:16px;font-weight:900;color:white;background:#5d4333}
.guardar{background:#5ca33f}
.borrar{background:#c00000}
.venta{border-left:7px solid #d78a1e}
.dato{font-weight:700;margin:4px 0;color:#333}
.vacio{text-align:center;font-weight:900;color:#8c674d;padding:20px}
.resumen{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.cajaResumen{background:white;border-radius:18px;padding:16px;text-align:center;font-weight:900;box-shadow:0 8px 18px rgba(0,0,0,.09)}
.cajaResumen span{display:block;font-size:24px;color:#5d4333;margin-top:6px}
@media(max-width:760px){.resumen{grid-template-columns:1fr}}
</style>
</head>

<body>

<header>
<h1>💰 Ventas</h1>
<button class="volver" onclick="location.href='index.html'">VOLVER</button>
</header>

<div class="contenedor">

<div class="resumen">
<div class="cajaResumen">Hoy<span id="ventaHoy">0,00 €</span></div>
<div class="cajaResumen">Mes<span id="ventaMes">0,00 €</span></div>
<div class="cajaResumen">Año<span id="ventaAno">0,00 €</span></div>
</div>

<div class="card">
<h2>Venta total del día</h2>

<label>Fecha</label>
<input id="fecha" type="date">

<label>Total venta del día</label>
<input id="total" type="number" step="0.01" placeholder="0.00">

<label>Observaciones</label>
<textarea id="observaciones" placeholder="Notas del día"></textarea>

<div class="botones">
<button class="guardar" onclick="guardarVenta()">GUARDAR</button>
<button onclick="limpiarFormulario()">LIMPIAR</button>
</div>
</div>

<div class="card">
<h2>Histórico de ventas</h2>
<div id="lista"></div>
</div>

</div>

<script>
let editandoId = null;

function dinero(n){
return Number(n || 0).toLocaleString("es-ES",{style:"currency",currency:"EUR"});
}

function hoyISO(){
return new Date().toISOString().slice(0,10);
}

function leerVentas(){
return JSON.parse(localStorage.getItem("aromas_ventas") || "[]");
}

function guardarVentas(datos){
localStorage.setItem("aromas_ventas", JSON.stringify(datos));
}

function guardarVenta(){

const venta = {
id: editandoId || Date.now(),
fecha: document.getElementById("fecha").value || hoyISO(),
total: Number(document.getElementById("total").value || 0),
observaciones: document.getElementById("observaciones").value.trim(),
fechaRegistro: new Date().toLocaleString("es-ES")
};

if(venta.total <= 0){
alert("Pon el total de venta del día.");
return;
}

let datos = leerVentas();

const yaExiste = datos.find(v => v.fecha === venta.fecha && v.id !== editandoId);
if(yaExiste){
if(!confirm("Ya hay una venta guardada para ese día. ¿Guardar otra igualmente?")) return;
}

if(editandoId){
datos = datos.map(v => v.id === editandoId ? venta : v);
}else{
datos.push(venta);
}

guardarVentas(datos);
limpiarFormulario();
pintarVentas();
}

function editarVenta(id){

const v = leerVentas().find(x => x.id === id);
if(!v) return;

editandoId = id;

document.getElementById("fecha").value = v.fecha || hoyISO();
document.getElementById("total").value = v.total || "";
document.getElementById("observaciones").value = v.observaciones || "";

window.scrollTo({top:0,behavior:"smooth"});
}

function borrarVenta(id){

if(!confirm("¿Borrar esta venta?")) return;

const datos = leerVentas().filter(v => v.id !== id);
guardarVentas(datos);
pintarVentas();
}

function limpiarFormulario(){

editandoId = null;

document.getElementById("fecha").value = hoyISO();
document.getElementById("total").value = "";
document.getElementById("observaciones").value = "";
}

function pintarResumen(datos){

const hoy = hoyISO();
const mes = hoy.slice(0,7);
const ano = hoy.slice(0,4);

const ventaHoy = datos
.filter(v => v.fecha === hoy)
.reduce((s,v)=>s + Number(v.total || 0),0);

const ventaMes = datos
.filter(v => String(v.fecha || "").slice(0,7) === mes)
.reduce((s,v)=>s + Number(v.total || 0),0);

const ventaAno = datos
.filter(v => String(v.fecha || "").slice(0,4) === ano)
.reduce((s,v)=>s + Number(v.total || 0),0);

document.getElementById("ventaHoy").textContent = dinero(ventaHoy);
document.getElementById("ventaMes").textContent = dinero(ventaMes);
document.getElementById("ventaAno").textContent = dinero(ventaAno);
}

function pintarVentas(){

const lista = document.getElementById("lista");
const datos = leerVentas().sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));

pintarResumen(datos);

if(datos.length === 0){
lista.innerHTML = "<div class='vacio'>No hay ventas todavía.</div>";
return;
}

lista.innerHTML = datos.map(v => `
<div class="card venta">
<h3>${v.fecha}</h3>
<div class="dato">💰 Total día: ${dinero(v.total)}</div>
<div class="dato">📝 ${v.observaciones || "Sin observaciones"}</div>
<div class="dato">Registro: ${v.fechaRegistro || ""}</div>

<div class="botones">
<button onclick="editarVenta(${v.id})">EDITAR</button>
<button class="borrar" onclick="borrarVenta(${v.id})">BORRAR</button>
</div>
</div>
`).join("");
}

limpiarFormulario();
pintarVentas();
</script>

</body>
</html>
