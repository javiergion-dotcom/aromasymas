<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incidencias · Aromas y Más</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3efe9;color:#2b211b}
header{background:linear-gradient(180deg,#7b5a46,#5d4333);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:24px}
.volver{background:white;color:#5d4333;border:0;border-radius:999px;padding:10px 16px;font-weight:900}
.contenedor{padding:18px;max-width:950px;margin:auto}
.card{background:white;border-radius:24px;padding:20px;margin-bottom:18px;box-shadow:0 10px 24px rgba(0,0,0,.12)}
label{font-weight:900;margin-top:12px;display:block}
input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #cfc7bf;font-size:16px;margin-top:6px}
textarea{min-height:100px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.botones{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:16px;padding:14px 18px;font-size:16px;font-weight:900;color:white;background:#5d4333}
.guardar{background:#5ca33f}
.borrar{background:#c00000}
.aviso{background:#d78a1e}
.abierta{border-left:7px solid #c00000;background:#fff7f7}
.resuelta{border-left:7px solid #5ca33f;background:#f5fff3}
.dato{font-weight:700;margin:4px 0;color:#333}
.vacio{text-align:center;font-weight:900;color:#8c674d;padding:20px}
.resumen{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.cajaResumen{background:white;border-radius:18px;padding:16px;text-align:center;font-weight:900;box-shadow:0 8px 18px rgba(0,0,0,.09)}
.cajaResumen span{display:block;font-size:26px;color:#5d4333;margin-top:6px}
@media(max-width:760px){
.grid{grid-template-columns:1fr}
.resumen{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<h1>⚠️ Incidencias</h1>
<button class="volver" onclick="location.href='index.html'">VOLVER</button>
</header>

<div class="contenedor">

<div class="resumen">
<div class="cajaResumen">Abiertas<span id="totalAbiertas">0</span></div>
<div class="cajaResumen">Resueltas<span id="totalResueltas">0</span></div>
<div class="cajaResumen">Total<span id="totalIncidencias">0</span></div>
</div>

<div class="card">
<h2>Nueva incidencia</h2>

<div class="grid">
<div>
<label>Fecha</label>
<input id="fecha" type="date">
</div>

<div>
<label>Estado</label>
<select id="estado">
<option>Abierta</option>
<option>Resuelta</option>
</select>
</div>
</div>

<label>Título / asunto</label>
<input id="titulo" placeholder="Ej: rotos dos jabones, devolución, error proveedor...">

<label>Descripción</label>
<textarea id="descripcion" placeholder="Explica la incidencia"></textarea>

<label>Solución / seguimiento</label>
<textarea id="solucion" placeholder="Qué se hizo o qué queda pendiente"></textarea>

<div class="botones">
<button class="guardar" onclick="guardarIncidencia()">GUARDAR</button>
<button onclick="limpiarFormulario()">LIMPIAR</button>
</div>
</div>

<div class="card">
<h2>Histórico de incidencias</h2>
<div id="lista"></div>
</div>

</div>

<script>
let editandoId = null;

function hoyISO(){
return new Date().toISOString().slice(0,10);
}

function leerIncidencias(){
return JSON.parse(localStorage.getItem("aromas_incidencias") || "[]");
}

function guardarIncidencias(datos){
localStorage.setItem("aromas_incidencias", JSON.stringify(datos));
}

function guardarIncidencia(){

const incidencia = {
id: editandoId || Date.now(),
fecha: document.getElementById("fecha").value || hoyISO(),
estado: document.getElementById("estado").value,
titulo: document.getElementById("titulo").value.trim(),
descripcion: document.getElementById("descripcion").value.trim(),
solucion: document.getElementById("solucion").value.trim(),
fechaRegistro: new Date().toLocaleString("es-ES")
};

if(!incidencia.titulo){
alert("Pon un título o asunto.");
return;
}

let datos = leerIncidencias();

if(editandoId){
datos = datos.map(i => i.id === editandoId ? incidencia : i);
}else{
datos.push(incidencia);
}

guardarIncidencias(datos);
limpiarFormulario();
pintarIncidencias();
}

function editarIncidencia(id){

const i = leerIncidencias().find(x => x.id === id);
if(!i) return;

editandoId = id;

document.getElementById("fecha").value = i.fecha || hoyISO();
document.getElementById("estado").value = i.estado || "Abierta";
document.getElementById("titulo").value = i.titulo || "";
document.getElementById("descripcion").value = i.descripcion || "";
document.getElementById("solucion").value = i.solucion || "";

window.scrollTo({top:0,behavior:"smooth"});
}

function borrarIncidencia(id){

if(!confirm("¿Borrar esta incidencia?")) return;

const datos = leerIncidencias().filter(i => i.id !== id);
guardarIncidencias(datos);
pintarIncidencias();
}

function marcarResuelta(id){

const datos = leerIncidencias().map(i => {
if(i.id === id){
i.estado = "Resuelta";
i.fechaResuelta = new Date().toLocaleString("es-ES");
}
return i;
});

guardarIncidencias(datos);
pintarIncidencias();
}

function marcarAbierta(id){

const datos = leerIncidencias().map(i => {
if(i.id === id){
i.estado = "Abierta";
delete i.fechaResuelta;
}
return i;
});

guardarIncidencias(datos);
pintarIncidencias();
}

function limpiarFormulario(){

editandoId = null;

document.getElementById("fecha").value = hoyISO();
document.getElementById("estado").value = "Abierta";
document.getElementById("titulo").value = "";
document.getElementById("descripcion").value = "";
document.getElementById("solucion").value = "";
}

function claseEstado(estado){
return estado === "Resuelta" ? "resuelta" : "abierta";
}

function pintarResumen(datos){

const abiertas = datos.filter(i => i.estado !== "Resuelta").length;
const resueltas = datos.filter(i => i.estado === "Resuelta").length;

document.getElementById("totalAbiertas").textContent = abiertas;
document.getElementById("totalResueltas").textContent = resueltas;
document.getElementById("totalIncidencias").textContent = datos.length;
}

function pintarIncidencias(){

const lista = document.getElementById("lista");
const datos = leerIncidencias().sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));

pintarResumen(datos);

if(datos.length === 0){
lista.innerHTML = "<div class='vacio'>No hay incidencias todavía.</div>";
return;
}

lista.innerHTML = datos.map(i => `
<div class="card ${claseEstado(i.estado)}">
<h3>${i.titulo}</h3>
<div class="dato">📅 Fecha: ${i.fecha || ""}</div>
<div class="dato">📌 Estado: ${i.estado}</div>
<div class="dato">📝 ${i.descripcion || "Sin descripción"}</div>
<div class="dato">✅ Solución: ${i.solucion || "Sin solución indicada"}</div>
<div class="dato">Registro: ${i.fechaRegistro || ""}</div>
${i.fechaResuelta ? `<div class="dato">Cerrada: ${i.fechaResuelta}</div>` : ""}

<div class="botones">
<button onclick="editarIncidencia(${i.id})">EDITAR</button>
<button class="guardar" onclick="marcarResuelta(${i.id})">RESUELTA</button>
<button class="aviso" onclick="marcarAbierta(${i.id})">ABIERTA</button>
<button class="borrar" onclick="borrarIncidencia(${i.id})">BORRAR</button>
</div>
</div>
`).join("");
}

document.getElementById("fecha").value = hoyISO();
pintarIncidencias();
</script>

</body>
</html>
