<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda · Aromas y Más</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3efe9;color:#2b211b}
header{background:linear-gradient(180deg,#7b5a46,#5d4333);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:24px}
.volver{background:white;color:#5d4333;border:0;border-radius:999px;padding:10px 16px;font-weight:900}
.contenedor{padding:18px;max-width:900px;margin:auto}
.card{background:white;border-radius:24px;padding:20px;margin-bottom:18px;box-shadow:0 10px 24px rgba(0,0,0,.12)}
label{font-weight:900;margin-top:12px;display:block}
input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #cfc7bf;font-size:16px;margin-top:6px}
textarea{min-height:90px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.botones{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:16px;padding:14px 18px;font-size:16px;font-weight:900;color:white;background:#5d4333}
.guardar{background:#5ca33f}
.borrar{background:#c00000}
.aviso{background:#d78a1e}
.pendiente{border-left:7px solid #d78a1e}
.hecho{border-left:7px solid #5ca33f;background:#f5fff3}
.dato{font-weight:700;margin:4px 0;color:#333}
.vacio{text-align:center;font-weight:900;color:#8c674d;padding:20px}
.resumen{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.cajaResumen{background:white;border-radius:18px;padding:16px;text-align:center;font-weight:900;box-shadow:0 8px 18px rgba(0,0,0,.09)}
.cajaResumen span{display:block;font-size:26px;color:#5d4333;margin-top:6px}
@media(max-width:760px){
.grid{grid-template-columns:1fr}
.resumen{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<h1>📅 Agenda</h1>
<button class="volver" onclick="location.href='index.html'">VOLVER</button>
</header>

<div class="contenedor">

<div class="resumen">
<div class="cajaResumen">Pendientes<span id="totalPendientes">0</span></div>
<div class="cajaResumen">Hechas<span id="totalHechas">0</span></div>
<div class="cajaResumen">Total<span id="totalAgenda">0</span></div>
</div>

<div class="card">
<h2>Nueva nota de agenda</h2>

<div class="grid">
<div>
<label>Fecha</label>
<input id="fecha" type="date">
</div>

<div>
<label>Tipo</label>
<select id="tipo">
<option>Recordatorio</option>
<option>Cita</option>
<option>Pedido</option>
<option>Aviso</option>
<option>Otro</option>
</select>
</div>
</div>

<label>Título</label>
<input id="titulo" placeholder="Ej: llamar proveedor, revisar escaparate, encargo cliente...">

<label>Notas</label>
<textarea id="notas" placeholder="Detalle de la nota"></textarea>

<div class="botones">
<button class="guardar" onclick="guardarNota()">GUARDAR</button>
<button onclick="limpiarFormulario()">LIMPIAR</button>
</div>
</div>

<div class="card">
<h2>Agenda</h2>
<div id="lista"></div>
</div>

</div>

<script>
let editandoId = null;

function hoyISO(){
return new Date().toISOString().slice(0,10);
}

function leerAgenda(){
return JSON.parse(localStorage.getItem("aromas_agenda") || "[]");
}

function guardarAgenda(datos){
localStorage.setItem("aromas_agenda", JSON.stringify(datos));
}

function guardarNota(){

const nota = {
id: editandoId || Date.now(),
fecha: document.getElementById("fecha").value || hoyISO(),
tipo: document.getElementById("tipo").value,
titulo: document.getElementById("titulo").value.trim(),
notas: document.getElementById("notas").value.trim(),
hecha: false,
fechaRegistro: new Date().toLocaleString("es-ES")
};

if(!nota.titulo){
alert("Pon un título.");
return;
}

let datos = leerAgenda();

if(editandoId){
datos = datos.map(n => {
if(n.id === editandoId){
nota.hecha = n.hecha || false;
nota.fechaHecha = n.fechaHecha || "";
return nota;
}
return n;
});
}else{
datos.push(nota);
}

guardarAgenda(datos);
limpiarFormulario();
pintarAgenda();
}

function editarNota(id){

const n = leerAgenda().find(x => x.id === id);
if(!n) return;

editandoId = id;

document.getElementById("fecha").value = n.fecha || hoyISO();
document.getElementById("tipo").value = n.tipo || "Recordatorio";
document.getElementById("titulo").value = n.titulo || "";
document.getElementById("notas").value = n.notas || "";

window.scrollTo({top:0,behavior:"smooth"});
}

function borrarNota(id){

if(!confirm("¿Borrar esta nota?")) return;

const datos = leerAgenda().filter(n => n.id !== id);
guardarAgenda(datos);
pintarAgenda();
}

function marcarHecha(id){

const datos = leerAgenda().map(n => {
if(n.id === id){
n.hecha = true;
n.fechaHecha = new Date().toLocaleString("es-ES");
}
return n;
});

guardarAgenda(datos);
pintarAgenda();
}

function marcarPendiente(id){

const datos = leerAgenda().map(n => {
if(n.id === id){
n.hecha = false;
n.fechaHecha = "";
}
return n;
});

guardarAgenda(datos);
pintarAgenda();
}

function limpiarFormulario(){

editandoId = null;

document.getElementById("fecha").value = hoyISO();
document.getElementById("tipo").value = "Recordatorio";
document.getElementById("titulo").value = "";
document.getElementById("notas").value = "";
}

function claseNota(n){
return n.hecha ? "hecho" : "pendiente";
}

function pintarResumen(datos){

const pendientes = datos.filter(n => !n.hecha).length;
const hechas = datos.filter(n => n.hecha).length;

document.getElementById("totalPendientes").textContent = pendientes;
document.getElementById("totalHechas").textContent = hechas;
document.getElementById("totalAgenda").textContent = datos.length;
}

function pintarAgenda(){

const lista = document.getElementById("lista");
const datos = leerAgenda().sort((a,b)=>String(a.fecha).localeCompare(String(b.fecha)));

pintarResumen(datos);

if(datos.length === 0){
lista.innerHTML = "<div class='vacio'>No hay notas en la agenda todavía.</div>";
return;
}

lista.innerHTML = datos.map(n => `
<div class="card ${claseNota(n)}">
<h3>${n.titulo}</h3>
<div class="dato">📅 Fecha: ${n.fecha || ""}</div>
<div class="dato">🏷️ Tipo: ${n.tipo || ""}</div>
<div class="dato">📝 ${n.notas || "Sin notas"}</div>
<div class="dato">📌 Estado: ${n.hecha ? "Hecha" : "Pendiente"}</div>
<div class="dato">Registro: ${n.fechaRegistro || ""}</div>
${n.fechaHecha ? `<div class="dato">✅ Hecha el: ${n.fechaHecha}</div>` : ""}

<div class="botones">
<button onclick="editarNota(${n.id})">EDITAR</button>
<button class="guardar" onclick="marcarHecha(${n.id})">HECHA</button>
<button class="aviso" onclick="marcarPendiente(${n.id})">PENDIENTE</button>
<button class="borrar" onclick="borrarNota(${n.id})">BORRAR</button>
</div>
</div>
`).join("");
}

limpiarFormulario();
pintarAgenda();
</script>

</body>
</html>
