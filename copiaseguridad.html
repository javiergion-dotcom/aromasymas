<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copia Seguridad · Aromas y Más</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f3efe9;
color:#2b211b;
}

header{
background:linear-gradient(180deg,#7b5a46 0%,#5d4333 100%);
color:white;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:24px;
}

.volver{
background:white;
color:#5d4333;
border:0;
border-radius:999px;
padding:10px 16px;
font-weight:900;
cursor:pointer;
}

.contenedor{
padding:18px;
max-width:850px;
margin:auto;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 10px 24px rgba(0,0,0,.12);
}

button{
border:0;
border-radius:18px;
padding:16px 22px;
font-size:16px;
font-weight:900;
color:white;
cursor:pointer;
margin-top:14px;
width:100%;
}

.exportar{
background:#5ca33f;
}

.importar{
background:#d78a1e;
}

input[type=file]{
margin-top:16px;
width:100%;
padding:12px;
background:#f7f2ec;
border-radius:14px;
border:1px solid #d6cdc4;
}

.info{
font-weight:700;
line-height:1.7;
color:#444;
margin-top:10px;
}

.estado{
margin-top:18px;
padding:14px;
border-radius:16px;
background:#f7f2ec;
font-weight:900;
text-align:center;
color:#5d4333;
}

</style>
</head>

<body>

<header>

<h1>💾 Copia seguridad</h1>

<button class="volver"
onclick="location.href='index.html'">
VOLVER
</button>

</header>

<div class="contenedor">

<div class="card">

<h2>Exportar copia</h2>

<div class="info">
Descarga una copia completa del sistema para guardar en otro dispositivo, Google Drive, email o WhatsApp.
</div>

<button class="exportar"
onclick="exportarDatos()">

📥 DESCARGAR COPIA

</button>

</div>

<div class="card">

<h2>Restaurar copia</h2>

<div class="info">
Selecciona una copia guardada anteriormente para recuperar toda la información.
</div>

<input type="file" id="archivo">

<button class="importar"
onclick="importarDatos()">

📤 RESTAURAR COPIA

</button>

</div>

<div class="estado" id="estado">
Sistema listo.
</div>

</div>

<script>

function estado(texto){

document.getElementById("estado").textContent = texto;

}

function exportarDatos(){

const datos = {

proveedores:
JSON.parse(
localStorage.getItem("aromas_proveedores") || "[]"
),

articulos:
JSON.parse(
localStorage.getItem("aromas_articulos") || "[]"
),

pedidos:
JSON.parse(
localStorage.getItem("aromas_pedidos") || "[]"
),

pagos:
JSON.parse(
localStorage.getItem("aromas_pagos") || "[]"
),

ventas:
JSON.parse(
localStorage.getItem("aromas_ventas") || "[]"
),

incidencias:
JSON.parse(
localStorage.getItem("aromas_incidencias") || "[]"
),

agenda:
JSON.parse(
localStorage.getItem("aromas_agenda") || "[]"
),

historico:
JSON.parse(
localStorage.getItem("aromas_historico") || "[]"
)

};

const blob = new Blob(
[
JSON.stringify(datos,null,2)
],
{
type:"application/json"
}
);

const enlace =
document.createElement("a");

enlace.href =
URL.createObjectURL(blob);

enlace.download =
"aromasymas_copia_" +
new Date().toISOString().slice(0,10) +
".json";

enlace.click();

estado("✅ Copia descargada correctamente.");

}

function importarDatos(){

const archivo =
document.getElementById("archivo").files[0];

if(!archivo){

alert("Selecciona un archivo.");

return;

}

const lector = new FileReader();

lector.onload = function(e){

try{

const datos =
JSON.parse(e.target.result);

localStorage.setItem(
"aromas_proveedores",
JSON.stringify(
datos.proveedores || []
)
);

localStorage.setItem(
"aromas_articulos",
JSON.stringify(
datos.articulos || []
)
);

localStorage.setItem(
"aromas_pedidos",
JSON.stringify(
datos.pedidos || []
)
);

localStorage.setItem(
"aromas_pagos",
JSON.stringify(
datos.pagos || []
)
);

localStorage.setItem(
"aromas_ventas",
JSON.stringify(
datos.ventas || []
)
);

localStorage.setItem(
"aromas_incidencias",
JSON.stringify(
datos.incidencias || []
)
);

localStorage.setItem(
"aromas_agenda",
JSON.stringify(
datos.agenda || []
)
);

localStorage.setItem(
"aromas_historico",
JSON.stringify(
datos.historico || []
)
);

estado("✅ Copia restaurada correctamente.");

setTimeout(function(){

location.reload();

},1000);

}catch(error){

alert("Archivo inválido.");

estado("❌ Error al restaurar.");

}

};

lector.readAsText(archivo);

}

</script>

</body>
</html>
